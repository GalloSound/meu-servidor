services:
  kopia_backup:
    image: "kopia/kopia:${KOPIA_IMAGE_TAG:-0.23.1}"
    container_name: kopia_backup
    restart: unless-stopped
    command:
      - server
      - start
      - --address=0.0.0.0:51515
      - --server-username=${KOPIA_UI_USER}
      - --server-password=${KOPIA_UI_PASSWORD}
      - --ui
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      KOPIA_PASSWORD: ${KOPIA_REPOSITORY_PASSWORD}
      USER: ${KOPIA_SYSTEM_USER:-backup}
    ports:
      - "127.0.0.1:${KOPIA_UI_PORT:-51515}:51515"
    volumes:
      - ./data/config:/app/config
      - ./data/cache:/app/cache
      - ./data/logs:/app/logs
      - ./staging:/staging
      - ./credentials:/credentials:ro

